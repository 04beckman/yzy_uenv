syntax = "proto3";
package uenv.v1;

import "uenv/v1/scheduler.proto";

// 干净版 proto：CancelEpisodeResponse 已移除旧汇总字段，只保留拆分后的取消语义。
//
// 管理服务：运维管理接口（PRD §4.2 扩展）。
service AdminService {
    rpc ListWorkers(uenv.scheduler.v1.ListWorkersRequest) returns (uenv.scheduler.v1.ListWorkersResponse);
    rpc DrainWorker(DrainWorkerRequest) returns (DrainWorkerResponse);
    rpc CancelEpisode(CancelEpisodeRequest) returns (CancelEpisodeResponse);
    rpc GetServerStatus(GetServerStatusRequest) returns (ServerStatus);
}

// ─── 管理接口 ───────────────────────────────────────────────────

message DrainWorkerRequest {
    string worker_id = 1;
    int32 grace_period_sec = 2;
}

message DrainWorkerResponse {
    bool accepted = 1;
}

message CancelEpisodeRequest {
    string episode_id = 1;
    uint32 attempt_id = 2;
}

message CancelEpisodeResponse {
    // 历史字段号，已删除并保留，禁止复用。
    reserved 1;
    // 明确的 server 侧终态，不依赖 worker RPC 是否成功。
    bool server_cancelled = 2;
    // server 是否尝试通知原生 worker 停止物理执行。
    bool worker_cancel_attempted = 3;
    // worker 是否确认接受物理取消请求。
    bool worker_cancel_accepted = 4;
    // worker 取消结果码，例如 ACCEPTED、RPC_FAILED、NOT_DISPATCHED。
    string worker_cancel_code = 5;
    // 便于人工阅读的 worker 取消结果详情。
    string worker_cancel_message = 6;
}

message GetServerStatusRequest {}

message ServerStatus {
    uint64 server_epoch = 1;
    int32 worker_count = 2;
    int32 active_episode_count = 3;
    int32 pending_episode_count = 4;
}
