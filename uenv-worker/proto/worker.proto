syntax = "proto3";
package uenv.worker.v1;

import "uenv/v1/episode.proto";
import "uenv/v1/common.proto";

service WorkerService {
    rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
    rpc WorkerHeartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
    rpc DispatchEpisode(DispatchEpisodeRequest) returns (DispatchEpisodeResponse);
    rpc ReportStream(stream uenv.v1.StreamReport) returns (ReportStreamAck);
}

message RegisterWorkerRequest {
    string worker_id = 1;
    repeated string supported_env_types = 2;
    uenv.v1.ResourceSpec resource = 3;
    string address = 4;
}

message RegisterWorkerResponse {
    bool accepted = 1;
    string message = 2;
}

message HeartbeatRequest {
    string worker_id = 1;
    int32 load = 2;
    int32 max_load = 3;
    int64 timestamp_ms = 4;
}

message HeartbeatResponse {
    bool ok = 1;
    DrainCommand drain = 2;
}

message DrainCommand {
    bool drain = 1;
    int32 grace_period_sec = 2;
}

message DispatchEpisodeRequest {
    uenv.v1.EpisodeRequest episode = 1;
}

message DispatchEpisodeResponse {
    bool accepted = 1;
}

message ReportStreamAck {
    bool received = 1;
}
