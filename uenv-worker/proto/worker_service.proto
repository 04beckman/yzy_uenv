syntax = "proto3";
package uenv.worker.v1;

import "uenv/v1/episode.proto";

// WorkerGrpcService — Scheduler 作为 Client 主动调用 Worker

service WorkerGrpcService {
    rpc DispatchEpisode(DispatchEpisodeRequest) returns (stream uenv.v1.StreamReport);
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
    rpc CancelEpisode(CancelWorkerEpisodeRequest) returns (CancelWorkerEpisodeResponse);
}

message DispatchEpisodeRequest {
    uenv.v1.EpisodeRequest episode = 1;
}

message HealthCheckRequest {}

message HealthCheckResponse {
    bool ok = 1;
    string status = 2;
}


message CancelWorkerEpisodeRequest {
    string episode_id = 1;
    uint32 attempt_id = 2;
    string dispatch_lease_id = 3;
    bytes dispatch_token = 4;
}

message CancelWorkerEpisodeResponse {
    bool accepted = 1;
    string code = 2;
    string message = 3;
}
