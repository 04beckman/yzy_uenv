server:
  grpc_addr: "http://127.0.0.1:8088"
  admin_url: "http://127.0.0.1:50052"

run:
  scenario: "s00-smoke"
  run_id: "s00-smoke"
  worker_prefix: "bench"
  workers: 100
  duration_secs: 0
  heartbeat_interval_ms: 5000
  register_rps: 100
  register_concurrency: 16
  max_load: 1
  supported_env_types:
    - math
  endpoint_template: "bench://{worker_id}"

loadgen:
  shard_id: 0
  shard_count: 1
  metrics_output: "baseline-artifacts/current/loadgen.jsonl"

safety:
  require_allow_live: true
  deny_if_admin_busy: true
