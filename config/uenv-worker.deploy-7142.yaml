# UEnv Worker — A100 7142（已废弃：Worker 改部署 7143，7142 仅 Adapter）
# 请使用 config/uenv-worker.deploy-7143.yaml

server:
  endpoint: "8.130.86.71:8088"

worker:
  id: "auto"
  listen: "0.0.0.0:18888"
  advertise_endpoint: "219.147.100.43:18888"
  max_concurrent: 4

scheduler:
  mode: "remote"

env:
  types: ["math"]
  backend: "process"
  plugin_dir: "/root/UEnv/plugins"

pool:
  warmup_size: 2
  prewarm_on_startup: false
  max_idle_time: 300
  cool_timeout: 60
  max_episode_count: 1000

logging:
  level: "INFO"
  file: "/var/log/uenv/worker.log"

wal:
  dir: "/tmp/uenv/wal"

observability:
  metrics_listen: "0.0.0.0:18777"
  health_listen: "0.0.0.0:18777"

hub:
  enabled: false
