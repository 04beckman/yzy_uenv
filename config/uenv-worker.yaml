# UEnv Worker 配置示例（ADR-002 YAML）
# 默认路径：/etc/uenv/worker.yaml；开发环境可用 ./config/uenv-worker.yaml
# 优先级：CLI > 环境变量 > 配置文件 > 默认值

server:
  endpoint: "192.168.56.1:50051"   # UENV_SERVER_ENDPOINT（当前按本机预联调决议配置）

worker:
  id: "auto"                    # UENV_WORKER_ID
  listen: "0.0.0.0:50052"       # UENV_WORKER_LISTEN（供 Scheduler 回连 DispatchEpisode）
  max_concurrent: 4             # UENV_MAX_CONCURRENT

scheduler:
  mode: "remote"                # UENV_SCHEDULER_MODE: remote | mock

env:
  types: ["math", "code"]              # UENV_ENV_TYPES — Phase 0 MathEnv
  backend: "process"            # UENV_BACKEND
  plugin_dir: "./plugins"       # UENV_PLUGIN_DIR

pool:
  warmup_size: 2                # UENV_WARMUP_POOL_SIZE（目标 Warm 实例数；缺实例时按需拉起）
  prewarm_on_startup: false     # UENV_PREWARM_ON_STARTUP；false=首条 Episode 再创建实例
  max_idle_time: 300            # UENV_MAX_IDLE_TIME
  cool_timeout: 60              # UENV_COOL_TIMEOUT
  max_episode_count: 1000       # UENV_MAX_EPISODE_COUNT

logging:
  level: "INFO"                 # UENV_LOG_LEVEL
  file: "/var/log/uenv/worker.log"  # UENV_LOG_FILE

wal:
  dir: "/var/lib/uenv/wal"      # UENV_WAL_DIR; must survive Worker restarts

observability:
  metrics_listen: "0.0.0.0:19090"  # UENV_METRICS_LISTEN，GET /metrics
  health_listen: "0.0.0.0:19090"   # UENV_HEALTH_LISTEN，GET /health

hub:
  enabled: false                   # UENV_HUB_ENABLED
  endpoint: "http://127.0.0.1:8080"  # UENV_HUB_ENDPOINT（设置后自动启用；缺 manifest/首 spawn 时拉元数据）
