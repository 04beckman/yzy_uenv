# UEnv Server 配置示例（uenv-server / adapter-core 共用）
# 实机：/root/UEnv/config/server.yaml 或 UENV_CONFIG_PATH 指定
# 轨迹 v2.2 环境变量见 config/uenv-server.trajectory.env.example

port: 50051

scheduler:
  strategy: round_robin
  # Worker 有活跃 load 但超过此秒数无 episode 完成，标记为 degraded，停止分配新任务
  worker_degraded_threshold_secs: 400
  # 无可用 Worker 时调度循环的重试等待间隔（毫秒）
  schedule_retry_interval_ms: 500
  # Server 建议 Worker 使用的心跳间隔（毫秒）
  heartbeat_interval_ms: 5000
  # Worker 超过此秒数无心跳视为连接断开（建议为 heartbeat_interval_ms*6/1000）
  heartbeat_timeout_secs: 30

episode:
  # 客户端未在 EpisodeRequest.timeout_seconds 中指定超时时，使用此默认值（秒）
  default_timeout_secs: 300
  # episode 超过此秒数未完成时打印 warn 日志（秒，建议约为 default_timeout_secs 的一半）
  stale_warning_secs: 150
  # 单个 episode 最多重试次数，超过后返回 failed
  max_attempts: 3
  # dynamic queue: permit count follows worker registrations
  queue_dynamic: true
  # episode 完成广播 channel 的容量，按最大 Worker 数 x 32 估算
  broadcast_capacity: 1024

# Server 运行状态持久化默认开启。生产部署使用 worktree 之外的绝对路径。
persistence:
  enabled: true
  db_path: /home/uenv/server-state/server-state.db
  busy_timeout_ms: 5000
  terminal_ttl_secs: 86400
  idempotency_ttl_secs: 3600
  recovery_grace_secs: 30
  max_completed_entries: 100000
  max_result_bytes: 16777216
  max_database_bytes: 107374182400
  max_wal_bytes: 1073741824
  min_free_space_bytes: 10737418240
  writer_queue_capacity: 4096
  shutdown_grace_secs: 45

pool:
  max_idle: 16
  warmup_enabled: true
  warmup_env_types:
    - math
    - code
admin_http_port: 50052
