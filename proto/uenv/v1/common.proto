syntax = "proto3";
package uenv.v1;

// ─── 错误码 ──────────────────────────────────────────────
enum ErrorCode {
    ERROR_UNSPECIFIED       = 0;
    OK                      = 1;

    // 客户端错误 (1xxx)
    ERR_INVALID_REQUEST     = 1001;
    ERR_UNKNOWN_ENV_TYPE    = 1002;
    ERR_UNSUPPORTED_MODE    = 1003;
    ERR_ASYNC_PROTOCOL_MISSING_FIELD = 1004;

    // 调度错误 (2xxx)
    ERR_NO_AVAILABLE_WORKER = 2001;
    ERR_WORKER_TIMEOUT      = 2002;
    ERR_EPISODE_TIMEOUT     = 2003;

    // Worker 错误 (3xxx)
    ERR_WORKER_CRASHED      = 3001;
    ERR_ENV_INIT_FAILED     = 3002;
    ERR_ENV_STEP_FAILED     = 3003;
    ERR_MODEL_CALL_FAILED   = 3004;
    ERR_ALREADY_RUNNING     = 3005;
    ERR_ALREADY_COMPLETED   = 3006;
    ERR_LEASE_EXPIRED       = 3007;
    ERR_LEASE_SUPERSEDED    = 3008;
    ERR_MODEL_VERSION_MISSING = 3009;
    ERR_ROLLOUT_LOGPROBS_MISSING = 3010;
    ERR_MODEL_LOGPROBS_UNSUPPORTED = 3011;

    // 内部错误 (5xxx)
    ERR_INTERNAL            = 5001;
}

// ─── 资源规格 ──────────────────────────────────────────────
message ResourceSpec {
    int32 cpu_cores   = 1;
    int32 memory_mb   = 2;
    int32 gpu_count   = 3;
    string gpu_type   = 4;
}

// ─── 执行模式 ──────────────────────────────────────────────
enum ExecutionMode {
    MODE_UNSPECIFIED  = 0;
    MODE_SINGLE       = 1;
    MODE_MULTI        = 2;
    MODE_MODEL_CALLBACK = 3;
    MODE_CUSTOM       = 4;
}

