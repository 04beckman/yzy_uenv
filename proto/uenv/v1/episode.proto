syntax = "proto3";
package uenv.v1;

import "uenv/v1/common.proto";
import "google/protobuf/timestamp.proto";

// 模型调用端点配置。
// url、model_name、generation_config_json、max_retries 都通过这个结构化消息传递。
message ModelEndpoint {
    string endpoint_type = 1;
    string url = 2;
    string model_name = 3;
    bytes generation_config_json = 4;
    int32 max_retries = 5;
}

// 干净版 proto：不再从 metadata、payload 或 info 中读取旧协议字段。
// 这份文件用于未来替换正式 proto。
//
// ─── Episode 请求 ──────────────────────────────────────────
message EpisodeRequest {
    reserved 8;
    reserved "model_endpoint";

    string episode_id = 1;
    uint32 attempt_id = 2;
    string env_type   = 3;              // 环境类型，例如 "math" 或 "swe"。
    // 下发给 worker 的环境/业务输入。
    // 允许承载 question、dataset、SWE instance_id/benchmark_variant/command_mode 等
    // worker 执行所需字段；不承载 parallel_mode、rollout 版本、logprobs、
    // timing、lease、model_endpoint_config、env_package_id/version 等协议字段。
    bytes payload     = 4;
    ExecutionMode mode = 5;
    int32 max_steps   = 6;
    ResourceSpec resource_spec = 7;
    optional int32 seed = 9;
    string correlation_id = 10;
    int32 timeout_seconds = 11;
    bytes reward_config = 12;

    // 分发租约（§7.7）
    string dispatch_lease_id = 13;
    google.protobuf.Timestamp lease_expire_at = 14;
    uint64 scheduler_epoch = 15;
    bytes dispatch_token = 16;

    // Hub EnvPackage 引用（设计 260629）。
    string env_package_id = 17;
    string env_package_version = 18;

    // VeRL 异步训练模式。
    // "sync" | "one_step_off_policy" | "fully_async".
    string parallel_mode = 19;
    optional double enqueue_ts = 20;
    // 仅用于上下文元数据。parallel_mode、rollout 版本、rollout_log_probs、
    // response_ids/response_mask、时间统计、租约和调度字段不应写到这里。
    map<string, string> metadata = 21;
    // 结构化模型端点配置；不再从 payload 或旧 model_endpoint 字符串读取。
    ModelEndpoint model_endpoint_config = 22;
}
// 异步训练使用的 rollout 轨迹字段。
message RolloutTrace {
    repeated int64 response_ids   = 1;
    repeated int32 response_mask  = 2;
}

// 单步记录。
message StepRecord {
    int32 step_index              = 1;
    bytes observation             = 2;
    bytes action                  = 3;
    double reward                 = 4;
    bool terminated               = 5;
    bool truncated                = 6;
    // 自由格式环境信息；不承载 response_ids/response_mask 等协议字段。
    map<string, string> info      = 7;
    int64 duration_ms             = 8;
    // 结构化保存 response_ids/response_mask。
    RolloutTrace rollout_trace    = 9;
}

// ─── 轨迹 ──────────────────────────────────────────────
message Trajectory {
    repeated StepRecord steps     = 1;
    double total_reward           = 2;
    int32 total_steps             = 3;
}

// ─── Episode 结果 ────────────────────────────────────────────
message EpisodeResult {
    string episode_id     = 1;
    uint32 attempt_id     = 2;
    string status         = 3;   // 终态："completed" | "failed" | "timeout"
    Trajectory trajectory = 4;

    message Summary {
        double total_reward   = 1;
        int32 total_steps     = 2;
        int64 total_duration_ms = 3;
        string terminate_reason = 4;
    }
    Summary summary       = 5;
    optional ErrorCode error_code = 6;
    string error_message  = 7;
    string trajectory_checksum = 8;
    bool integrity_verified = 9;
    // v2.2：轨迹指针（原生路径 ReportResult 关联 trajectory 库）。
    string trajectory_id = 10;
    string trajectory_storage_url = 11;
    // SWE+Agent 路径：Server 预建的 Gateway session id（便于按 session 追踪）。
    string gateway_session_id = 12;

    // EpisodeResult 上的训练协议结果。不要再把这些字段重复写入 metadata。
    string parallel_mode = 13;
    optional int64 rollout_param_version = 14;
    optional string rollout_policy_version = 15;
    repeated float rollout_log_probs = 16;
    // 仅用于上下文元数据；不承载 parallel_mode、rollout 版本、logprobs 或时间统计。
    map<string, string> metadata = 17;
    // server、worker、model 的时间延迟。
    optional double dispatch_ts = 18;
    optional double worker_start_ts = 19;
    optional double worker_finish_ts = 20;
    optional double result_ready_ts = 21;
    optional int64 server_latency_ms = 22;
    optional int64 worker_latency_ms = 23;
    optional int64 model_latency_ms = 24;
}

// ─── 流式报告 ─────────────────────────────────────────────
// PRD §4.2：Episode 执行中的实时进度反馈（Server 消费 DispatchEpisode 流）
enum ReportType {
    REPORT_TYPE_UNSPECIFIED = 0;
    PROGRESS                = 1;
    STEP_COMPLETE           = 2;
    REWARD_SIGNAL           = 3;
    LOG                     = 4;
    PACING                  = 5;
}

message StreamReport {
    string episode_id     = 1;
    uint32 attempt_id     = 2;
    int32 current_step    = 3;
    int32 total_steps     = 4;
    double current_reward = 5;
    // MVP 兼容字段；新实现应同时设置 report_type。
    string phase          = 6;  // 阶段："running" | "step_complete" | "episode_complete"
    optional StepRecord last_step = 7;

    // PRD §4.2 扩展（第 1 阶段及之后逐步落地）
    ReportType report_type = 8;
    int64 step_latency_ms  = 9;
    int64 model_latency_ms = 10;
    double estimated_remaining_seconds = 11;
    int32 worker_active_episodes = 12;
    int32 worker_capacity = 13;
    string correlation_id = 14;
    string worker_id      = 15;
}
