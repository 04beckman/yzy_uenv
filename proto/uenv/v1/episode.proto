syntax = "proto3";
package uenv.v1;

import "uenv/v1/common.proto";
import "google/protobuf/timestamp.proto";

// ─── EpisodeRequest ──────────────────────────────────────────
message EpisodeRequest {
    string episode_id = 1;
    uint32 attempt_id = 2;
    string env_type   = 3;              // Phase 0: "math" (MathEnv); dataset in payload
    bytes payload     = 4;
    ExecutionMode mode = 5;
    int32 max_steps   = 6;
    ResourceSpec resource_spec = 7;
    string model_endpoint = 8;
    optional int32 seed = 9;
    string correlation_id = 10;
    int32 timeout_seconds = 11;
    bytes reward_config = 12;

    // Dispatch lease (§7.7)
    string dispatch_lease_id = 13;
    google.protobuf.Timestamp lease_expire_at = 14;
    uint64 scheduler_epoch = 15;
    bytes dispatch_token = 16;

    // Hub EnvPackage reference (design 260629).
    string env_package_id = 17;
    string env_package_version = 18;
}

// ─── StepRecord ──────────────────────────────────────────────
message StepRecord {
    int32 step_index              = 1;
    bytes observation             = 2;
    bytes action                  = 3;
    double reward                 = 4;
    bool terminated               = 5;
    bool truncated                = 6;
    map<string, string> info      = 7;
    int64 duration_ms             = 8;
}

// ─── Trajectory ──────────────────────────────────────────────
message Trajectory {
    repeated StepRecord steps     = 1;
    double total_reward           = 2;
    int32 total_steps             = 3;
}

// ─── EpisodeResult ────────────────────────────────────────────
message EpisodeResult {
    string episode_id     = 1;
    uint32 attempt_id     = 2;
    string status         = 3;   // "completed" | "failed" | "timeout"
    Trajectory trajectory = 4;

    message Summary {
        double total_reward   = 1;
        int32 total_steps     = 2;
        int64 total_duration_ms = 3;
        string terminate_reason = 4;
    }
    Summary summary       = 5;
    optional ErrorCode error_code = 6;
    string error_message  = 7;
    string trajectory_checksum = 8;
    bool integrity_verified = 9;
    // v2.2：轨迹指针（native 路径 ReportResult 关联 trajectory 库）。
    string trajectory_id = 10;
    string trajectory_storage_url = 11;
    // SWE+Agent 路径：Server 预建的 Gateway session id（便于按 session 追踪）。
    string gateway_session_id = 12;
}

// ─── StreamReport ─────────────────────────────────────────────
// PRD §4.2：Episode 执行中的实时进度反馈（Server 消费 DispatchEpisode 流）
enum ReportType {
    REPORT_TYPE_UNSPECIFIED = 0;
    PROGRESS                = 1;
    STEP_COMPLETE           = 2;
    REWARD_SIGNAL           = 3;
    LOG                     = 4;
    PACING                  = 5;
}

message StreamReport {
    string episode_id     = 1;
    uint32 attempt_id     = 2;
    int32 current_step    = 3;
    int32 total_steps     = 4;
    double current_reward = 5;
    // MVP 兼容字段；新实现应同时设置 report_type
    string phase          = 6;  // "running" | "step_complete" | "episode_complete"
    optional StepRecord last_step = 7;

    // PRD §4.2 扩展（Phase 1+ 逐步落地）
    ReportType report_type = 8;
    int64 step_latency_ms  = 9;
    int64 model_latency_ms = 10;
    double estimated_remaining_seconds = 11;
    int32 worker_active_episodes = 12;
    int32 worker_capacity = 13;
    string correlation_id = 14;
    string worker_id      = 15;
}
