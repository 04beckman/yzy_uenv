[package]
name = "uenv-server"
version = "0.1.0"
edition = "2024"
description = "UEnv Server - Schedule and manage environment workers"

[[bin]]
name = "uenv-server"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tonic = "0.12"
prost = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
snafu = "0.8"
dashmap = "6"
async-trait = "0.1"
futures = "0.3"
bytes = "1"
parking_lot = "0.12"
humantime = "2"
humantime-serde = "1"
