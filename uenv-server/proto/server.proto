// =============================================================================
// UEnv Server gRPC 协议定义
// =============================================================================
//
// 本文件包含 uenv-server 涉及的所有 gRPC 接口和消息类型。
//
// Server 相关的四个 service：
//   训练框架 (Python) --[UEnvService]-----------> Server（Server 实现）
//   Worker (Rust)     --[WorkerRegistration]----> Server（Server 实现）
//   Server (Rust)     --[WorkerExecution]-------> Worker（Server 作为客户端调用）
//   运维人员           --[AdminService]----------> Server（Server 实现）
// =============================================================================

syntax = "proto3";
package uenv.v1;

// =============================================================================
// UEnvService：训练框架 → Server（Server 实现）
// =============================================================================
service UEnvService {
    // 同步提交单个 episode，阻塞等待执行完成后返回结果
    rpc SubmitEpisode(EpisodeRequest) returns (EpisodeResult);

    // 双向流式提交：客户端连续发送请求，服务端连续返回结果
    rpc SubmitEpisodeStream(stream EpisodeRequest) returns (stream EpisodeResult);

    // 批量提交：一次提交一组 episode，全部完成后返回
    rpc SubmitBatch(BatchRequest) returns (BatchResult);

    // 异步提交：立即返回确认，结果通过 GetEpisodeResult/WatchEpisodes 获取（Phase 2+）
    rpc SubmitEpisodeAsync(EpisodeRequest) returns (SubmitAck);

    // 查询异步提交的 episode 结果（Phase 2+）
    rpc GetEpisodeResult(GetResultRequest) returns (EpisodeResult);

    // 订阅某 correlation_id 下所有 episode 的结果流（Phase 2+）
    rpc WatchEpisodes(WatchRequest) returns (stream EpisodeResult);
}

// =============================================================================
// WorkerRegistration：Worker → Server（Server 实现）
// =============================================================================
service WorkerRegistration {
    // Worker 启动时向 Server 注册，告知地址、支持的环境类型、并发容量
    rpc RegisterWorker(RegisterRequest) returns (RegisterResponse);

    // 双向心跳流：Worker 定期发送心跳，Server 回复控制指令（Phase 1+）
    rpc WorkerHeartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);

    // 健康检查
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// =============================================================================
// WorkerExecution：Server → Worker（Server 作为 gRPC 客户端调用）
// =============================================================================
service WorkerExecution {
    // Server 分发 episode 给 Worker 执行；Worker 通过流持续上报进度，最后返回完整结果
    rpc DispatchEpisode(DispatchRequest) returns (stream StreamReport);

    // Worker 主动向 Server 上报 episode 结果（备用通道）
    rpc ReportResult(EpisodeResult) returns (Ack);

    // 健康检查
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// =============================================================================
// AdminService：运维管理 → Server（Server 实现）
// =============================================================================
service AdminService {
    // 列出所有已注册的 Worker 及其状态
    rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);

    // 排空指定 Worker：完成当前任务后停止接受新任务
    rpc DrainWorker(DrainWorkerRequest) returns (DrainWorkerResponse);

    // 取消正在执行或等待执行的 episode
    rpc CancelEpisode(CancelEpisodeRequest) returns (CancelEpisodeResponse);

    // 获取 Server 整体状态（epoch、Worker 数量、活跃/排队 episode 数）
    rpc GetServerStatus(GetServerStatusRequest) returns (ServerStatus);
}

// =============================================================================
// 核心消息定义
// =============================================================================

// EpisodeRequest：一次 episode 交互的完整请求
message EpisodeRequest {
    string protocol_version = 1;
    string request_id = 2;
    string correlation_id = 3;
    string framework = 4;
    string env_type = 5;
    bytes env_config = 6;
    string env_id = 7;
    ModelEndpoint model_endpoint = 8;
    EpisodeConfig episode_config = 9;
    RewardConfig reward_config = 10;
    bytes metadata = 11;
    int32 priority = 12;
    double timeout_seconds = 13;
    string response_endpoint = 14;
}

// ModelEndpoint：模型推理服务的连接信息
message ModelEndpoint {
    string endpoint_type = 1;
    string url = 2;
    string model_name = 3;
    bytes generation_config = 4;
    int32 max_retries = 5;

    oneof native_ref {
        string ray_actor_handle = 10;
        string monarch_actor_ref = 11;
    }

    string required_model_version = 14;
    bool allow_stale_model = 15;
}

// EpisodeConfig：控制单个 episode 的执行行为
message EpisodeConfig {
    int32 max_steps = 1;
    int32 max_turns = 2;
    int32 seed = 3;
    bytes initial_observation = 4;
    repeated string stop_conditions = 5;
    string system_prompt = 6;
    bytes extra_messages = 7;
}

// RewardConfig：控制奖励的计算方式
message RewardConfig {
    string reward_type = 1;
    bytes rubric_config = 2;
    string external_endpoint = 3;
    bytes reward_shaping = 4;
    bytes component_weights = 5;
}

// EpisodeResult：一次 episode 执行完毕后的完整结果
message EpisodeResult {
    string protocol_version = 1;
    string request_id = 2;
    string correlation_id = 3;
    string worker_id = 4;
    double response_ts = 5;
    Status status = 6;
    EpisodeError error = 7;
    Trajectory trajectory = 8;
    Summary summary = 9;

    bytes trajectory_checksum = 20;
    bool integrity_verified = 21;

    repeated int32 input_ids = 30;
    int32 prompt_length = 31;
    repeated float token_level_rewards = 32;
    repeated int32 response_mask = 34;
    string inference_model_version = 33;

    enum Status {
        COMPLETED = 0;
        FAILED = 1;
        PARTIAL = 2;
        TIMEOUT = 3;
    }
}

// Trajectory：一个 episode 的完整交互轨迹
message Trajectory {
    repeated StepRecord steps = 1;
    int32 total_steps = 2;
    int32 total_tokens = 3;
    bytes initial_observation = 4;
    bytes final_observation = 5;
}

// StepRecord：单步交互记录（observation, action, reward, done）
message StepRecord {
    int32 step_index = 1;
    bytes observation = 2;
    string action = 3;
    double action_logprob = 4;
    double reward = 5;
    double step_reward = 6;
    bool terminated = 7;
    bool truncated = 8;
    bytes info = 9;
    int32 req_tokens = 10;
    int32 resp_tokens = 11;
    double latency_ms = 12;
}

// Summary：episode 的汇总统计信息
message Summary {
    double total_reward = 1;
    bytes reward_components = 2;
    int32 episode_length = 3;
    int32 total_model_calls = 4;
    double total_latency_ms = 5;
    double model_latency_ms = 6;
    double env_latency_ms = 7;
    bool success = 8;
    string termination_reason = 9;
}

// StreamReport：Worker 执行 episode 过程中的实时进度上报
message StreamReport {
    string request_id = 1;
    string worker_id = 2;
    ReportType report_type = 3;
    int32 current_step = 4;
    int32 total_steps = 5;
    bytes payload = 6;
    double estimated_remaining_seconds = 7;

    enum ReportType {
        PROGRESS = 0;
        STEP_COMPLETE = 1;
        REWARD_SIGNAL = 2;
        LOG = 3;
        EPISODE_RESULT = 4;  // payload 中包含序列化的 EpisodeResult
    }
}

// EpisodeError：episode 执行失败时的错误信息
message EpisodeError {
    string error_type = 1;
    string error_message = 2;
    int32 error_step = 3;
    Trajectory partial_trajectory = 4;
}

// =============================================================================
// 批量请求/响应
// =============================================================================

message BatchRequest {
    string batch_id = 1;
    int32 batch_size = 2;
    repeated EpisodeRequest episodes = 3;
    int32 timeout_seconds = 4;
    bool partial_results = 5;
}

message BatchResult {
    string batch_id = 1;
    int32 completed_count = 2;
    int32 failed_count = 3;
    int32 total_count = 4;
    bool batch_complete = 5;
    repeated EpisodeResult results = 6;
}

// =============================================================================
// 异步模式消息（Phase 2+）
// =============================================================================

message SubmitAck {
    string episode_id = 1;
    bool accepted = 2;
    int32 queue_position = 3;
    int32 estimated_wait_seconds = 4;
}

message GetResultRequest {
    string episode_id = 1;
}

message WatchRequest {
    string correlation_id = 1;
}

// =============================================================================
// Worker 注册与心跳消息
// =============================================================================

message RegisterRequest {
    string worker_id = 1;
    string endpoint = 2;
    repeated string supported_env_types = 3;
    int32 capacity = 4;
}

message RegisterResponse {
    bool accepted = 1;
}

message HeartbeatRequest {
    string worker_id = 1;
    int32 active_episodes = 2;
    double timestamp = 3;
}

message HeartbeatResponse {
    int32 server_epoch = 1;
    ControlAction control = 2;
}

enum ControlAction {
    RUN = 0;
    DRAIN = 1;
    SHUTDOWN = 2;
}

message DispatchRequest {
    EpisodeRequest request = 1;
    int32 timeout_seconds = 2;
}

message Ack {
    bool accepted = 1;
}

message HealthCheckRequest {
    string service_id = 1;
}

message HealthCheckResponse {
    ServingStatus status = 1;

    enum ServingStatus {
        UNKNOWN = 0;
        SERVING = 1;
        NOT_SERVING = 2;
    }
}

// =============================================================================
// Admin 消息
// =============================================================================

message ListWorkersRequest {}

message ListWorkersResponse {
    repeated WorkerInfoProto workers = 1;
}

message WorkerInfoProto {
    string worker_id = 1;
    string endpoint = 2;
    repeated string supported_env_types = 3;
    int32 capacity = 4;
    int32 active_episodes = 5;
    string lifecycle_state = 6;
}

message DrainWorkerRequest {
    string worker_id = 1;
}

message DrainWorkerResponse {
    bool accepted = 1;
}

message CancelEpisodeRequest {
    string episode_id = 1;
}

message CancelEpisodeResponse {
    bool cancelled = 1;
}

message GetServerStatusRequest {}

message ServerStatus {
    uint64 server_epoch = 1;
    int32 worker_count = 2;
    int32 active_episode_count = 3;
    int32 pending_episode_count = 4;
}
